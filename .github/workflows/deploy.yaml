deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: dockerize

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig to connect to EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Replace placeholders and deploy
        run: |
          # Rebuild the image URI directly — same formula as dockerize job
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          BUILD="${{ github.sha }}"

          echo "IMAGE value is: $IMAGE"

          sed -i "s|IMAGE_PLACEHOLDER|${IMAGE}|g" k8s/deployment.yaml
          sed -i "s|BUILDVER_PLACEHOLDER|${BUILD}|g" k8s/deployment.yaml

          echo "--- Verifying image line ---"
          grep "image:" k8s/deployment.yaml

          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for deployment to complete
        run: |
          kubectl rollout status deployment/dynatrace-eks-app --timeout=120s