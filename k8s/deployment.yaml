# k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment

metadata:
  name: dynatrace-eks-app
  labels:
    app: dynatrace-eks-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: dynatrace-eks-app

  template:
    metadata:
      labels:
        app: dynatrace-eks-app
    spec:
      containers:
        - name: app
          image: IMAGE_PLACEHOLDER

          ports:
            - containerPort: 3000

          env:
            - name: BUILD_VERSION
              value: "BUILDVER_PLACEHOLDER"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20

          # Mount the EBS volume into the container
          volumeMounts:
            - name: app-storage
              mountPath: /app/data
              # EBS volume will be available at /app/data inside the container

      volumes:
        - name: app-storage
          persistentVolumeClaim:
            claimName: app-ebs-pvc
            # This connects to the PVC we created above